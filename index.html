<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Cormorant+Garamond&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
background:#380202;
font-family:'Cormorant Garamond',serif;
overflow:hidden;
}

.page{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
transition:all .8s;
}

.hidden-page{
opacity:0;
pointer-events:none;
transform:translateY(30px);
}

.active-page{
opacity:1;
}

.nav-dot{
width:10px;
height:10px;
border-radius:50%;
border:2px solid rgba(201,169,110,.6);
}

.nav-dot.active{
background:#c9a96e;
}

.btn{
padding:14px 32px;
border:1px solid rgba(201,169,110,.5);
border-radius:40px;
letter-spacing:2px;
transition:.3s;
}

.btn:hover{
background:rgba(201,169,110,.2);
transform:translateY(-2px);
}

.shimmer{
background:linear-gradient(90deg,#c9a96e,#f5e6c8,#c9a96e);
background-size:200%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:shine 4s linear infinite;
}

@keyframes shine{
0%{background-position:-200%}
100%{background-position:200%}
}

.letter{
background:#fdf8f0;
color:#5a4a3a;
border-radius:16px;
padding:36px;
max-width:520px;
box-shadow:0 10px 40px rgba(0,0,0,.15);
}

.photo{
aspect-ratio:3/4;
background:linear-gradient(135deg,#2a2030,#342838);
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
color:#c9a96e;
font-size:12px;
}

</style>
</head>

<body>

<!-- NAV -->
<div style="position:fixed;right:24px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:12px;z-index:50">
<button class="nav-dot active" onclick="go(0)"></button>
<button class="nav-dot" onclick="go(1)"></button>
<button class="nav-dot" onclick="go(2)"></button>
</div>

<!-- PAGE 1 -->
<div id="p0" class="page active-page">

<div class="text-center">

<p class="tracking-[6px] text-[#c9a96e] text-sm mb-4 uppercase">Happy Birthday</p>

<h1 class="shimmer text-[40px]" style="font-family:'Great Vibes'">
Sharifah Nurul Hayati
</h1>

<p class="text-[#d4c4a8] tracking-[3px] mb-8">14 March 2026</p>

<button class="btn text-[#d4c4a8]" onclick="go(1)">
next
</button>

</div>

</div>

<!-- PAGE 2 -->
<div id="p1" class="page hidden-page">

<div class="text-center">

<h2 class="text-[36px] text-[#f5e6c8]" style="font-family:'Great Vibes'"> 🎂 بارك الله في عمرك</h2>

<div class="mt-6 max-w-[300px] mx-auto">

<img src="foto.jpg" class="w-full rounded-xl shadow-lg">

</div>

<div class="flex gap-4 mt-8 justify-center">

<button class="btn text-[#d4c4a8]" onclick="go(0)">back</button>
<button class="btn text-[#d4c4a8]" onclick="go(2)">read letter</button>

</div>

</div>

</div>

<!-- PAGE 3 -->
<div id="p2" class="page hidden-page">

<div class="text-center">

<p class="text-[#c9a96e] tracking-[5px] uppercase text-sm">A letter</p>

<h2 class="text-[36px] text-[#f5e6c8] mb-6" style="font-family:'Great Vibes'">
for you~
</h2>

<div class="letter">

<p style="font-family:'Great Vibes';font-size:26px;margin-bottom:14px;color:#8b6914">
dear sisterku tercinta...
</p>

<p style="line-height:1.8">
happy birthdayy kakakss 😙🫶🏻
  
  semoga kakak cepat² jadi billioner 🤑💵
  
  jangan lupa thr yang banyak yerr ☺️🫰🏻
</p>

</div>

<button class="btn text-[#d4c4a8] mt-8" onclick="go(1)">
back
</button>

</div>

</div>

<script>

const pages=[p0,p1,p2]
const dots=document.querySelectorAll('.nav-dot')
let cur=0

function go(i){

pages[cur].classList.remove('active-page')
pages[cur].classList.add('hidden-page')
dots[cur].classList.remove('active')

cur=i

pages[cur].classList.remove('hidden-page')
pages[cur].classList.add('active-page')
dots[cur].classList.add('active')

}

lucide.createIcons()

</script>

</body>
</html>
